<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0 }

body {
  width: 300px;
  min-height: 80px;
  background: #09090b;
  color: #fff;
  font-family: -apple-system, system-ui, 'Segoe UI', sans-serif;
  padding: 16px;
  font-size: 12px;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.brand {
  display: flex;
  align-items: center;
  gap: 7px;
}
.brand-icon {
  width: 16px;
  height: 16px;
  border-radius: 3px;
}
.brand-text {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .12em;
  color: rgba(255,255,255,.4);
  text-transform: uppercase;
}
.status {
  font-size: 9px;
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 600;
  letter-spacing: .03em;
}
.status.on {
  background: rgba(34,197,94,.08);
  color: #4ade80;
  border: 1px solid rgba(34,197,94,.12);
}
.status.off {
  background: rgba(255,255,255,.03);
  color: rgba(255,255,255,.2);
  border: 1px solid rgba(255,255,255,.04);
}

/* ── Hero (unauthenticated) ── */
.hero {
  text-align: center;
  padding: 16px 8px 18px;
}
.hero-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  margin: 0 auto 12px;
}
.hero-title {
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,.85);
  margin-bottom: 5px;
}
.hero-sub {
  font-size: 11px;
  color: rgba(255,255,255,.22);
  line-height: 1.5;
  margin-bottom: 16px;
  max-width: 210px;
  margin-left: auto;
  margin-right: auto;
}

/* ── User Row ── */
.user-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  background: rgba(255,255,255,.02);
  border: 1px solid rgba(255,255,255,.04);
  border-radius: 10px;
  margin-bottom: 10px;
}
.avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(5,109,250,.15), rgba(5,109,250,.05));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: rgba(5,109,250,.7);
  flex-shrink: 0;
}
.user-info { min-width: 0; flex: 1; }
.user-email {
  font-size: 11px;
  color: rgba(255,255,255,.4);
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Board ── */
.board-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.board-label {
  font-size: 9px;
  color: rgba(255,255,255,.18);
  text-transform: uppercase;
  letter-spacing: .1em;
  font-weight: 700;
  flex-shrink: 0;
}
.board-select {
  flex: 1;
  background: rgba(255,255,255,.02);
  border: 1px solid rgba(255,255,255,.05);
  border-radius: 7px;
  padding: 6px 8px;
  color: rgba(255,255,255,.55);
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  outline: none;
  transition: border-color .15s;
}
.board-select:focus { border-color: rgba(5,109,250,.3); }
.board-select option { background: #151517; color: #fff; }

.debug-info {
  font-size: 8px;
  font-family: 'SF Mono', 'Consolas', monospace;
  color: rgba(255,255,255,.12);
  padding: 2px 0;
  word-break: break-all;
  min-height: 10px;
}

/* ── Section ── */
.section { margin-bottom: 8px; }
.section-label {
  font-size: 9px;
  color: rgba(255,255,255,.15);
  text-transform: uppercase;
  letter-spacing: .08em;
  font-weight: 600;
  margin-bottom: 6px;
}

/* ── Queue ── */
.queue {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  margin-bottom: 8px;
}

/* ── Thumb status ── */
.thumb-wrap {
  position: relative;
  border-radius: 6px;
  overflow: hidden;
}
.thumb-wrap img, .thumb-placeholder {
  width: 40px;
  height: 40px;
  object-fit: cover;
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  background: rgba(255,255,255,.02);
}
.thumb-synced { border: 1.5px solid #22c55e; }
.thumb-uploading {
  border: 1.5px solid #6366f1;
  animation: pulse-border 1s ease-in-out infinite;
}
.thumb-failed { border: 1.5px solid #ef4444; }
.thumb-queued { border: 1.5px solid rgba(255,255,255,.06); }

@keyframes pulse-border {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ── Stats ── */
.stat-uploading { color: #a5b4fc; }
.stat-synced { color: #86efac; }
.stat-failed { color: #fca5a5; }
.stat-queued { color: rgba(255,255,255,.3); }

/* ── Queue Actions ── */
.queue-actions {
  display: flex;
  gap: 4px;
  margin-top: 4px;
}

/* ── Empty ── */
.empty-state {
  font-size: 11px;
  color: rgba(255,255,255,.12);
  text-align: center;
  padding: 14px 0;
}

/* ── Buttons ── */
.btn {
  width: 100%;
  padding: 8px;
  border: none;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 4px;
  font-family: inherit;
  transition: all .15s;
}
.btn.primary {
  background: #fff;
  color: #000;
}
.btn.primary:hover { background: rgba(255,255,255,.88); }
.btn.outline {
  background: transparent;
  border: 1px solid rgba(255,255,255,.06);
  color: rgba(255,255,255,.45);
}
.btn.outline:hover { border-color: rgba(255,255,255,.12); color: rgba(255,255,255,.7); }
.btn.ghost {
  background: transparent;
  color: rgba(255,255,255,.18);
  padding: 5px;
  font-size: 10px;
}
.btn.ghost:hover { color: rgba(255,255,255,.45); }
.btn.sm { font-size: 10px; padding: 5px; }

/* ── Divider ── */
.divider { height: 1px; background: rgba(255,255,255,.03); margin: 10px 0; }

/* ── Tip ── */
.tip {
  font-size: 9px;
  color: rgba(255,255,255,.1);
  text-align: center;
  margin-top: 8px;
  line-height: 1.5;
}

/* ── Board Alert ── */
.board-alert {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  background: rgba(251,191,36,.06);
  border: 1px solid rgba(251,191,36,.12);
  color: #fbbf24;
  font-size: 10px;
  font-weight: 600;
  animation: board-alert-pulse 2s ease-in-out infinite;
}
.board-alert-icon {
  font-size: 12px;
  animation: board-alert-bounce 1.5s ease-in-out infinite;
}
@keyframes board-alert-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.65; }
}
@keyframes board-alert-bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-2px); }
}
.board-select.needs-board {
  border-color: rgba(251,191,36,.25) !important;
  box-shadow: 0 0 0 1px rgba(251,191,36,.06);
}
</style>
</head>
<body>
<div class="header">
  <div class="brand">
    <img src="icon-32.png" class="brand-icon" alt="">
    <span class="brand-text">Moodboard</span>
  </div>
  <span class="status" id="statusPill">…</span>
</div>
<div id="content"></div>
<script src="popup.js"></script>
</body>
</html>
